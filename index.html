<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurants parisiens — Sites générés</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f7f5f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      color: #fff;
      padding: 3rem 2rem 2.5rem;
      text-align: center;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      letter-spacing: -.5px;
    }
    header p {
      margin-top: .75rem;
      color: #aaa;
      font-size: .95rem;
    }
    #stats {
      margin-top: 1.25rem;
      display: inline-flex;
      gap: 2rem;
    }
    #stats span {
      font-size: 1.5rem;
      font-weight: 500;
      color: #e8c97e;
    }
    #stats small { display: block; font-size: .75rem; color: #888; margin-top: .15rem; }

    .toolbar {
      max-width: 900px;
      margin: 2rem auto 0;
      padding: 0 1rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    #search {
      flex: 1;
      min-width: 200px;
      padding: .65rem 1rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: .95rem;
      font-family: inherit;
      background: #fff;
      outline: none;
      transition: border-color .2s;
    }
    #search:focus { border-color: #1a1a1a; }
    #sort {
      padding: .65rem 1rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: .9rem;
      font-family: inherit;
      background: #fff;
      cursor: pointer;
    }

    #grid {
      max-width: 1200px;
      margin: 2rem auto 4rem;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      transition: transform .2s, box-shadow .2s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
    }
    .card-body {
      padding: 1.25rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }
    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      line-height: 1.3;
    }
    .card-address {
      font-size: .8rem;
      color: #777;
    }
    .card-meta {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      margin-top: .25rem;
    }
    .badge {
      font-size: .72rem;
      padding: .2rem .55rem;
      border-radius: 20px;
      background: #f0ede6;
      color: #555;
      white-space: nowrap;
    }
    .badge.price { background: #e8f5e9; color: #2e7d32; }
    .badge.rating { background: #fff8e1; color: #f57f17; }
    .card-ambiance {
      font-size: .82rem;
      color: #555;
      line-height: 1.5;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid #f0ede6;
      display: flex;
      gap: .75rem;
    }
    .btn {
      flex: 1;
      text-align: center;
      padding: .55rem;
      border-radius: 7px;
      font-size: .85rem;
      font-family: inherit;
      font-weight: 500;
      text-decoration: none;
      transition: background .15s;
    }
    .btn-primary {
      background: #1a1a1a;
      color: #fff;
    }
    .btn-primary:hover { background: #333; }
    .btn-secondary {
      background: #f0ede6;
      color: #1a1a1a;
    }
    .btn-secondary:hover { background: #e0dbd2; }

    #empty {
      text-align: center;
      padding: 4rem 1rem;
      color: #999;
      display: none;
    }

    #loading {
      text-align: center;
      padding: 5rem 1rem;
      color: #999;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: .8rem;
      color: #bbb;
      border-top: 1px solid #e8e3da;
    }
  </style>
</head>
<body>

<header>
  <h1>Restaurants parisiens</h1>
  <p>Établissements sans site internet &mdash; sites générés automatiquement</p>
  <div id="stats">
    <div><span id="count-total">—</span><small>restaurants</small></div>
    <div><span id="count-sites">—</span><small>sites générés</small></div>
    <div><span id="count-arr">20</span><small>arrondissements</small></div>
  </div>
</header>

<div class="toolbar">
  <input id="search" type="search" placeholder="Rechercher un restaurant…" />
  <select id="sort">
    <option value="name">Nom A→Z</option>
    <option value="rating">Mieux notés</option>
    <option value="price">Prix croissant</option>
  </select>
</div>

<div id="loading">Chargement des restaurants…</div>
<div id="grid"></div>
<div id="empty">Aucun restaurant ne correspond à votre recherche.</div>

<footer>Données Google Maps · Sites générés par Claude (Anthropic)</footer>

<script>
  const PRICE_ORDER = { '': 0, 'gratuit': 0, '€': 1, '€€': 2, '€€€': 3, '€€€€': 4 };

  let all = [];

  async function load() {
    try {
      const res = await fetch('results.json');
      if (!res.ok) throw new Error();
      all = await res.json();
    } catch {
      document.getElementById('loading').textContent =
        '⚠️ results.json introuvable. Lancez le script puis committez les fichiers générés.';
      return;
    }
    document.getElementById('loading').style.display = 'none';
    document.getElementById('count-total').textContent = all.length;
    document.getElementById('count-sites').textContent =
      all.filter(r => r.website_file).length;
    render(all);
  }

  function render(list) {
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    grid.innerHTML = '';
    if (!list.length) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    list.forEach(r => grid.appendChild(card(r)));
  }

  function card(r) {
    const el = document.createElement('div');
    el.className = 'card';
    const siteBtn = r.website_file
      ? `<a class="btn btn-primary" href="${r.website_file}" target="_blank">Voir le site</a>`
      : `<span class="btn btn-primary" style="opacity:.4;cursor:default">Site non généré</span>`;
    el.innerHTML = `
      <div class="card-body">
        <div class="card-name">${esc(r.name)}</div>
        <div class="card-address">${esc(r.address)}</div>
        <div class="card-meta">
          ${r.price_level ? `<span class="badge price">${esc(r.price_level)}</span>` : ''}
          ${r.rating ? `<span class="badge rating">★ ${r.rating} (${r.total_reviews})</span>` : ''}
          ${r.categories ? r.categories.split(',').slice(0,2).map(c =>
            `<span class="badge">${esc(c.trim())}</span>`).join('') : ''}
        </div>
        ${r.ambiance_style
          ? `<p class="card-ambiance">${esc(r.ambiance_style)}</p>`
          : ''}
      </div>
      <div class="card-footer">
        ${siteBtn}
        <a class="btn btn-secondary" href="${esc(r.google_maps_url)}" target="_blank">Maps</a>
      </div>`;
    return el;
  }

  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function filtered() {
    const q = document.getElementById('search').value.toLowerCase();
    const s = document.getElementById('sort').value;
    let list = q
      ? all.filter(r =>
          (r.name + r.address + r.categories + r.ambiance_style)
            .toLowerCase().includes(q))
      : [...all];
    if (s === 'rating') list.sort((a,b) => (b.rating||0) - (a.rating||0));
    else if (s === 'price') list.sort((a,b) =>
      (PRICE_ORDER[a.price_level]||0) - (PRICE_ORDER[b.price_level]||0));
    else list.sort((a,b) => a.name.localeCompare(b.name, 'fr'));
    return list;
  }

  document.getElementById('search').addEventListener('input', () => render(filtered()));
  document.getElementById('sort').addEventListener('change', () => render(filtered()));

  load();
</script>
</body>
</html>
